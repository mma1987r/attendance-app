<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل الاستئذان</title>

<style>
body{
  font-family:Arial;
  min-height:100vh;
  background:#f5f7fa;
  padding:18px;
  box-sizing:border-box;
  margin:0;
}
.card{
  background:#fff;
  padding:22px;
  border-radius:20px;
  width:100%;
  max-width:420px;
  margin:auto;
  text-align:center;
  box-shadow:0 6px 20px #0001;
  box-sizing:border-box;
}
h2,h3{color:#1e3a8a}
select,input,button{
  box-sizing:border-box;
  font-size:18px;
  border-radius:12px;
  border:1px solid #ddd;
}
.main-input{
  width:100%;
  padding:12px;
  margin:6px 0;
}
.time-row{
  display:flex;
  gap:6px;
  margin:6px 0;
}
.time-row select{
  flex:1;
  padding:10px;
}
button{
  cursor:pointer;
}
.add-btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:20px;
  background:#dc2626;
  color:#fff;
  border:0;
}
.small-btn{
  margin-top:8px;
  padding:8px 14px;
  border:0;
}
.reset-btn{
  background:#1e3a8a;
  color:white;
}
.record{
  background:#f9fafb;
  margin:8px 0;
  padding:10px;
  border-radius:12px;
  text-align:right;
  border-right:4px solid #dc2626;
  line-height:1.7;
}
#msg{
  color:#dc2626;
  margin:10px;
}
#lastResult{
  font-size:26px;
  margin-top:12px;
  color:#1e3a8a;
}
</style>
</head>

<body>
<div class="card">

<h2>سجل الاستئذان</h2>

<select id="type" class="main-input">
  <option value="in">دخول متأخر</option>
  <option value="out">خروج مبكر</option>
</select>

<input type="date" id="date" class="main-input">

<div class="time-row">
  <select id="t1h"></select>
  <select id="t1m"></select>
  <select id="t1p">
    <option value="AM">AM</option>
    <option value="PM">PM</option>
  </select>
</div>

<div class="time-row">
  <select id="t2h"></select>
  <select id="t2m"></select>
  <select id="t2p">
    <option value="AM">AM</option>
    <option value="PM">PM</option>
  </select>
</div>

<button class="add-btn" onclick="add()">احسب و أضف</button>

<div id="lastResult">--:--</div>

<hr>

<div>المستخدم: <b id="used">00:00</b></div>
<div>المتبقي: <b id="left">12:00</b></div>
<div>العدد: <b id="count">0 / 4</b></div>

<div id="msg"></div>

<h3>السجل</h3>
<div id="list"></div>

<button class="small-btn" onclick="undo()">حذف آخر</button>
<button class="small-btn reset-btn" onclick="resetAll()">تصفير</button>

</div>

<script>
const TOTAL = 12 * 60;
const MAX = 4;
let data = JSON.parse(localStorage.getItem("data") || "[]");

document.getElementById("date").value = new Date().toISOString().split("T")[0];

function fillSelects(){
  const hourIds = ["t1h","t2h"];
  const minuteIds = ["t1m","t2m"];

  hourIds.forEach(id=>{
    const el = document.getElementById(id);
    el.innerHTML = '<option value="">ساعة</option>';
    for(let i=1;i<=12;i++){
      el.innerHTML += `<option value="${i}">${i}</option>`;
    }
  });

  minuteIds.forEach(id=>{
    const el = document.getElementById(id);
    el.innerHTML = '<option value="">دقيقة</option>';
    for(let i=0;i<60;i++){
      const v = String(i).padStart(2,"0");
      el.innerHTML += `<option value="${i}">${v}</option>`;
    }
  });
}

function getTime(h,m,p){
  h = +h;
  m = +m;

  if(!h || isNaN(m) || h < 1 || h > 12 || m < 0 || m > 59){
    return null;
  }

  if(p === "PM" && h !== 12) h += 12;
  if(p === "AM" && h === 12) h = 0;

  return h * 60 + m;
}

function displayTime(h,m,p){
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")} ${p}`;
}

function fmt(x){
  let h = Math.floor(x / 60);
  let m = x % 60;
  return String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");
}

function calc(type,a,b){
  if(type === "in"){
    return (a - b + 1440) % 1440;
  }else{
    return (b - a + 1440) % 1440;
  }
}

function add(){
  const type = document.getElementById("type").value;
  const date = document.getElementById("date").value;

  const h1 = document.getElementById("t1h").value;
  const m1 = document.getElementById("t1m").value;
  const p1 = document.getElementById("t1p").value;

  const h2 = document.getElementById("t2h").value;
  const m2 = document.getElementById("t2m").value;
  const p2 = document.getElementById("t2p").value;

  const a = getTime(h1,m1,p1);
  const b = getTime(h2,m2,p2);

  msg.innerText = "";

  if(a === null || b === null){
    msg.innerText = "اختر الساعة والدقيقة";
    return;
  }

  if(data.length >= MAX){
    msg.innerText = "وصلت الحد 4";
    return;
  }

  const r = calc(type,a,b);
  const usedNow = data.reduce((s,x)=>s+x.duration,0);

  if(usedNow + r > TOTAL){
    msg.innerText = "يتجاوز 12 ساعة";
    return;
  }

  data.push({
    duration:r,
    type:type === "in" ? "دخول متأخر" : "خروج مبكر",
    date:date,
    t1:displayTime(h1,m1,p1),
    t2:displayTime(h2,m2,p2)
  });

  localStorage.setItem("data", JSON.stringify(data));

  lastResult.innerText = fmt(r);

  document.getElementById("t1h").value = "";
  document.getElementById("t1m").value = "";
  document.getElementById("t2h").value = "";
  document.getElementById("t2m").value = "";

  render();
}

function undo(){
  data.pop();
  localStorage.setItem("data", JSON.stringify(data));
  render();
}

function resetAll(){
  if(confirm("تصفير السجل؟")){
    data = [];
    localStorage.setItem("data", "[]");
    lastResult.innerText = "--:--";
    render();
  }
}

function render(){
  const used = data.reduce((s,x)=>s+x.duration,0);
  const left = TOTAL - used;

  document.getElementById("used").innerText = fmt(used);
  document.getElementById("left").innerText = fmt(left);
  document.getElementById("count").innerText = data.length + " / " + MAX;

  document.getElementById("list").innerHTML = data.map((x,i)=>`
    <div class="record">
      ${i+1}) <b>${x.type}</b><br>
      التاريخ: ${x.date}<br>
      الوقت الأول: ${x.t1}<br>
      الوقت الرسمي: ${x.t2}<br>
      المدة: <b>${fmt(x.duration)}</b>
    </div>
  `).join("");
}

fillSelects();
render();
</script>
</body>
</html>
