<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>سجل الاستئذان</title></head><body style="font-family:Arial;min-height:100vh;background:#f5f7fa;padding:18px;box-sizing:border-box;"><div style="background:#fff;padding:22px;border-radius:20px;width:100%;max-width:420px;margin:auto;text-align:center;box-shadow:0 6px 20px #0001;"><h2 style="color:#1e3a8a;">سجل الاستئذان</h2><select id="type" onchange="updateLabels()" style="width:100%;padding:12px;margin:6px 0;font-size:18px;border-radius:12px;"><option value="in">دخول متأخر</option><option value="out">خروج مبكر</option></select><input type="date" id="date" style="width:100%;padding:12px;margin:6px 0;font-size:18px;border-radius:12px;"><div style="display:flex;gap:5px;margin:6px 0;"><input id="t1h" type="number" placeholder="ساعة" min="1" max="12" style="flex:1;padding:10px;"><input id="t1m" type="number" placeholder="دقيقة" min="0" max="59" style="flex:1;padding:10px;"><select id="t1p" style="flex:1;"><option>AM</option><option>PM</option></select></div><div style="display:flex;gap:5px;margin:6px 0;"><input id="t2h" type="number" placeholder="ساعة" min="1" max="12" style="flex:1;padding:10px;"><input id="t2m" type="number" placeholder="دقيقة" min="0" max="59" style="flex:1;padding:10px;"><select id="t2p" style="flex:1;"><option>AM</option><option>PM</option></select></div><button onclick="add()" style="width:100%;padding:12px;margin-top:10px;border-radius:20px;background:#dc2626;color:#fff;">احسب و أضف</button><div style="font-size:26px;margin-top:12px;color:#1e3a8a;" id="lastResult">--:--</div><hr><div>المستخدم: <b id="used">00:00</b></div><div>المتبقي: <b id="left">12:00</b></div><div>العدد: <b id="count">0 / 4</b></div><div id="msg" style="color:#dc2626;"></div><h3>السجل</h3><div id="list"></div><button onclick="undo()">حذف آخر</button><button onclick="resetAll()">تصفير</button></div><script>const TOTAL=12*60,MAX=4;let data=JSON.parse(localStorage.getItem("data")||"[]");document.getElementById("date").value=new Date().toISOString().split("T")[0];function getTime(h,m,p){h=+h;m=+m;if(isNaN(h)||isNaN(m)||h<1||h>12||m>59)return null;if(p=="PM"&&h!=12)h+=12;if(p=="AM"&&h==12)h=0;return h*60+m;}function fmt(x){let h=Math.floor(x/60),m=x%60;return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");}function calc(type,a,b){return type=="in"?((a-b+1440)%1440):((b-a+1440)%1440);}function add(){let type=typeEl.value;let a=getTime(t1h.value,t1m.value,t1p.value);let b=getTime(t2h.value,t2m.value,t2p.value);msg.innerText="";if(a==null||b==null){msg.innerText="خطأ بالوقت";return;}if(data.length>=MAX){msg.innerText="وصلت الحد";return;}let r=calc(type,a,b);let used=data.reduce((s,x)=>s+x.duration,0);if(used+r> TOTAL){msg.innerText="يتجاوز 12 ساعة";return;}data.push({duration:r,type:type=="in"?"دخول متأخر":"خروج مبكر"});localStorage.setItem("data",JSON.stringify(data));lastResult.innerText=fmt(r);render();}function undo(){data.pop();localStorage.setItem("data",JSON.stringify(data));render();}function resetAll(){data=[];localStorage.setItem("data","[]");render();}function render(){let used=data.reduce((s,x)=>s+x.duration,0);usedEl.innerText=fmt(used);leftEl.innerText=fmt(TOTAL-used);count.innerText=data.length+" / "+MAX;}const typeEl=document.getElementById("type");const usedEl=document.getElementById("used");const leftEl=document.getElementById("left");render();</script></body></html>
